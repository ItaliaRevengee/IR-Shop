# ============================================================
#  IR-Shop  —  Example Shop Definition
#  Items in this file are created automatically on first load.
#  Use /shopadmin to manage shops in-game instead.
# ============================================================

name: "survival"
display-name: "<green>Survival Shop"
description: "Buy and sell survival items"
currency: "vault"
layout: "classic"

# Icon shown when this shop appears in a shop-list GUI
icon:
  material: CHEST
  name: "<green>Survival Shop"
  lore:
    - "<gray>Buy and sell common survival items"

categories:
  blocks:
    display-name: "<white>Blocks"
    description: "Building blocks"
    icon:
      material: GRASS_BLOCK
      name: "<white>Blocks"
      lore:
        - "<gray>Building blocks and terrain materials"
    slot: 10
    items:
      - material: DIRT
        buy-price: 1.0
        sell-price: 0.5
        slot: 0
      - material: STONE
        buy-price: 2.0
        sell-price: 1.0
        slot: 1
      - material: OAK_LOG
        buy-price: 5.0
        sell-price: 3.0
        slot: 2
      - material: SAND
        buy-price: 2.0
        sell-price: 1.0
        slot: 3
      - material: GRAVEL
        buy-price: 2.0
        sell-price: 1.0
        slot: 4

  food:
    display-name: "<yellow>Food"
    description: "Food and consumables"
    icon:
      material: BREAD
      name: "<yellow>Food"
      lore:
        - "<gray>Food items and consumables"
    slot: 11
    items:
      - material: BREAD
        buy-price: 3.0
        sell-price: 1.5
        slot: 0
      - material: COOKED_BEEF
        buy-price: 8.0
        sell-price: 4.0
        slot: 1
      - material: GOLDEN_APPLE
        buy-price: 50.0
        sell-price: -1
        slot: 2

  tools:
    display-name: "<aqua>Tools"
    description: "Tools and weapons"
    icon:
      material: IRON_PICKAXE
      name: "<aqua>Tools"
      lore:
        - "<gray>Tools, weapons and armor"
    slot: 12
    items:
      - material: IRON_PICKAXE
        buy-price: 100.0
        sell-price: 50.0
        slot: 0
      - material: IRON_SWORD
        buy-price: 80.0
        sell-price: 40.0
        slot: 1
      - material: IRON_AXE
        buy-price: 90.0
        sell-price: 45.0
        slot: 2
      - material: IRON_SHOVEL
        buy-price: 60.0
        sell-price: 30.0
        slot: 3
