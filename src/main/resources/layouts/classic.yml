# Classic layout — 4-row chest, bordered inner grid
name: "Classic"
rows: 4

background:
  material: GRAY_STAINED_GLASS_PANE
  name: " "

border:
  material: BLACK_STAINED_GLASS_PANE
  name: " "

# Navigation button slots (0-indexed: row*9+col)
nav-slots:
  prev-page: 30
  back: 31
  next-page: 32
  close: 35

# 14 inner slots (rows 1-2, cols 1-7)
item-slots:
  - 10
  - 11
  - 12
  - 13
  - 14
  - 15
  - 16
  - 19
  - 20
  - 21
  - 22
  - 23
  - 24
  - 25
