# ============================================================
#  IR-Shop  —  Main Configuration
#  MiniMessage tags supported in display values.
# ============================================================

economy:
  # Default economy provider: "vault" (more providers coming soon)
  default-provider: vault

categories:
  # List of category files to load from categories/ folder
  # Add or remove entries to dynamically control which categories are available
  enabled:
    - food.yml
    - minerals.yml
    - blocks.yml
    - redstone.yml
    - farming.yml
    - nether.yml
    - end.yml
    - dyes.yml
    - mobs.yml
    - misc.yml

shop:
  # Show a confirmation GUI before completing a purchase
  confirm-purchases: true
  # Shift+click skips the confirmation GUI
  quick-buy: true
  # Default layout applied to shops that don't specify one
  default-layout: "classic"
  sounds:
    enabled: true
    open: "block.chest.open"
    close: "block.chest.close"
    purchase: "entity.experience_orb.pickup"
    sell: "entity.villager.trade"
    error: "entity.villager.no"
    page-turn: "item.book.page_turn"
    navigate-back: "ui.button.click"

discounts:
  # Permission node format: irshop.discount.<value>
  # The highest value the player holds wins.
  enabled: true
  max-discount: 90

sell-multipliers:
  # Permission node format: irshop.sell.<value>
  enabled: true

# Debug logging — enable only for troubleshooting
debug: false
