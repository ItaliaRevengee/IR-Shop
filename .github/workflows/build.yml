name: Build

on:
  push:
    # Manual release when pushing a v* tag
    tags:
      - 'v*'
    # Auto build/release only when gradle.properties changes
    branches:
      - '**'
    paths:
      - 'gradle.properties'

permissions:
  contents: write
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Check if the `version` line changed (not just any line in gradle.properties)
      - name: Detect version change
        id: pv_changed
        if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            if git diff "$BEFORE" "$AFTER" -- gradle.properties | grep -E '^[+-]\s*version=' >/dev/null; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "changed=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Read version
        id: plugin_version
        if: |
          (startsWith(github.ref, 'refs/tags/v')) ||
          (steps.pv_changed.outputs.changed == 'true' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
        shell: bash
        run: |
          set -euo pipefail
          v=$(grep -E '^version=' gradle.properties | head -n 1 | cut -d= -f2- | tr -d '\r' | xargs)
          if [ -z "$v" ]; then
            echo "version is empty" >&2
            exit 1
          fi
          echo "value=$v" >> "$GITHUB_OUTPUT"

      # Build only when: push of v* tag (manual release) OR version changed on default branch (auto release)
      - name: Build
        if: |
          startsWith(github.ref, 'refs/tags/v') ||
          (steps.pv_changed.outputs.changed == 'true' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch))
        run: ./gradlew --no-daemon build

      - name: Create tag (if missing) — auto bump
        id: create_tag
        if: steps.plugin_version.outputs.value != '' && !startsWith(github.ref, 'refs/tags/')
        uses: actions/github-script@v7
        env:
          PLUGIN_VERSION: ${{ steps.plugin_version.outputs.value }}
        with:
          script: |
            const version = process.env.PLUGIN_VERSION
            const tag = `v${version}`
            const owner = context.repo.owner
            const repo = context.repo.repo
            const sha = context.sha

            const defaultBranch = context.payload.repository.default_branch
            const refName = context.ref.replace('refs/heads/', '')
            if (refName !== defaultBranch) {
              core.info(`Not on default branch (${defaultBranch}); skipping tag creation.`)
              return
            }

            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` })
              core.info(`Tag ${tag} already exists; skipping tag creation.`)
              core.setOutput('tag', tag)
              core.setOutput('created', 'false')
              return
            } catch (err) {
              if (err.status !== 404) throw err
            }

            core.info(`Creating tag ${tag} at ${sha}`)
            await github.rest.git.createRef({ owner, repo, ref: `refs/tags/${tag}`, sha })
            core.setOutput('tag', tag)
            core.setOutput('created', 'true')

      - name: Generate changelog (all commits since previous v* tag)
        id: changelog
        if: |
          startsWith(github.ref, 'refs/tags/v') ||
          steps.create_tag.outputs.tag != ''
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            CURRENT_TAG="${GITHUB_REF_NAME}"
          else
            CURRENT_TAG="${{ steps.create_tag.outputs.tag }}"
          fi

          PREV_TAG="$(git describe --tags --match "v*" --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"

          CHANGELOG=$(
            echo "## Changelog"
            echo
            if [[ -n "$PREV_TAG" ]]; then
              echo "_Commits from **$PREV_TAG** to **$CURRENT_TAG**_"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${PREV_TAG}..${GITHUB_SHA}"
            else
              echo "_First release: full commit list up to **$CURRENT_TAG**_"
              echo
              git log --no-merges --pretty=format:'- %s (%h)' "${GITHUB_SHA}"
            fi
          )

          {
            echo "body<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create/Update GitHub Release (auto bump)
        if: steps.create_tag.outputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.create_tag.outputs.tag }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            build/libs/*.jar
          fail_on_unmatched_files: true

      - name: Create/Update GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            build/libs/*.jar
          fail_on_unmatched_files: true
